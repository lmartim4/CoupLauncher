name: Build and Release CoupLauncher

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Runs inside a manylinux_2_28 container so the binary only requires glibc >= 2.28.
  # This covers Ubuntu 20.04 (glibc 2.31), Debian 11, Fedora 33+, etc.
  # Building on ubuntu-22.04 directly would produce a binary that needs glibc 2.35.
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build inside manylinux_2_28 container
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e RELEASE_VERSION="$RELEASE_VERSION" \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c "
              set -e
              dnf install -y python3.11 python3.11-tkinter
              python3.11 -m ensurepip --upgrade
              python3.11 -m pip install --upgrade pip
              python3.11 -m pip install pyinstaller
              python3.11 build_launcher.py
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: build_output/*
          if-no-files-found: error

  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: dist-windows
          - os: macos-latest
            name: macOS arm64
            artifact: dist-macos-arm64
            target_arch: arm64
          - os: macos-latest
            name: macOS x86_64
            artifact: dist-macos-x86_64
            target_arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build launcher
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: python build_launcher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build_output/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-linux, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
