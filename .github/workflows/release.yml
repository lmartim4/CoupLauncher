name: Build and Release CoupLauncher

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: dist-linux
          - os: windows-latest
            artifact: dist-windows
          - os: macos-latest
            artifact: dist-macos-arm64
            target_arch: arm64
          - os: macos-latest
            artifact: dist-macos-x86_64
            target_arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Tkinter ships with Python on Windows/macOS but needs a system package on Linux.
      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build launcher
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: python build_launcher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build_output/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
