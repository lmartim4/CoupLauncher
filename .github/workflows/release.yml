name: Build and Release CoupLauncher

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # tkinter is not always pre-installed on Ubuntu GitHub runners
      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install build dependencies
        run: pip install pyinstaller

      - name: Build launcher
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: python build_launcher.py

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: build_output/*
          generate_release_notes: true
